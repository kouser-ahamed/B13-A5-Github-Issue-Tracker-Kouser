<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Tailwind CSS and DaisyUI CDN links -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Favicon link -->
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">

    <!-- Google Fonts -->

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Hind+Siliguri:wght@300;400;500;600;700&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">

    <title>GitHub Issues Tracker | Kouser</title>
</head>


<body>

    <div class="flex justify-center">
        <div class="bg-white p-8 mt-[70px] rounded-xl shadow-sm border border-gray-100 w-[500px] h-[743px] mb-[70px] ">

            <div class="flex flex-col items-center mb-8">

                <img src="assets/github-logo.png" alt="GitHub Logo" class="">

                <h1 class="text-2xl font-bold text-slate-800">
                    GitHub Issues Tracker</h1>

                <p class="text-slate-500 text-sm mt-1">
                    Sign in to manage your issues</p>
            </div>

            <div class="space-y-5">

                <div>

                    <label class="block text-sm font-semibold text-slate-700 mb-1">
                        Username</label>

                    <input type="text" id="username" placeholder="Enter Username" class="w-full px-4 py-3 rounded-lg border border-gray-200 focus:outline-none focus:ring-2
                         focus:ring-indigo-500 transition-all">

                    <p class="text-xs text-indigo-600 mt-1">
                        Default: admin</p>
                </div>

                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">

                        Password</label>


                    <input type="password" id="password" placeholder="Enter Password"
                        class="w-full px-4 py-3 rounded-lg border border-gray-200 focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-all">

                    <p class="text-xs text-indigo-600 mt-1">
                        Default: admin123</p>
                </div>

                <button type="submit" id="submit"
                    class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-lg shadow-lg shadow-indigo-200 transition-colors">
                    Sign In
                </button>
            </div>

            <div class="relative my-8">

                <div class="absolute inset-0 flex items-center">
                    <span class="w-full border-t border-gray-200">

                    </span>
                </div>
                <div class="relative flex justify-center text-xs uppercase">

                    <span class="bg-white px-2 text-slate-400 font-medium">
                        OR</span>

                </div>

            </div>

            <p class="text-1    xl text-slate-500 mb-2 font-medium text-center">

                Demo Credentials:</p>

            <div class="bg-slate-50 rounded-lg p-5 text-center border border-gray-50">


                <div class="text-sm text-slate-700">

                    <p>Username: admin</p>

                    <p>Password: admin123</p>
                </div>
            </div>

        </div>
    </div>


    <script src="signin.js"></script>
</body>

</html>
