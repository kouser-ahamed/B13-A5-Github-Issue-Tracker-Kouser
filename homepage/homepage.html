<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>

    <!-- Tailwind CSS and DaisyUI CDN links -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Favicon link -->
    <link rel="shortcut icon" href="../assets/github-logo.png" type="image/x-icon">


    <!-- Google Fonts -->

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Hind+Siliguri:wght@300;400;500;600;700&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">

</head>

<body>

    <!-- Navigation Bar -->

    <nav class="w-full mx-auto px-4 sm:px-8">
        <div class="bg-white border-b-3 border-gray-100 px-4 py-3 flex flex-wrap items-center justify-between">
            <div class="flex items-center gap-2 p-3">

                <div class="w-8 h-8 flex items-center justify-center">

                    <img src="../assets/github-logo.png" alt="GitHub Logo" />

                </div>

                <span class="font-bold text-slate-800 text-lg tracking-tight">
                    GitHub Issues Tracker</span>

            </div>

            <div class="flex items-center gap-4">

                <div class="sm:block">

                    <input id="input-search" type="text" placeholder="Search issues..."
                        class="bg-slate-50 border max-sm:w-[80%] border-gray-200 text-sm rounded-md py-2 pl-5 pr-4 w-64 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:bg-white transition-all" />

                </div>

                <button
                    class="bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-medium px-4 py-2 rounded-md transition-colors">

                    +New Issue
                </button>

            </div>

        </div>

    </nav>


    <!-- Main Content BTN and filter section -->

    <div class="max-w-7xl mx-auto px-4 py-6 space-y-4">

        <div class="bg-white p-3 rounded-lg border border-gray-100 shadow-sm">
            <div class="flex gap-2 p-4">

                <button id="btn-all"
                    class="btn btn-sm bg-[#6322FF]  text-white border-none px-8 normal-case">All</button>
                <button id="btn-open"
                    class="btn btn-sm btn-ghost text-gray-500  px-8 border border-gray-100 normal-case">Open</button>
                <button id="btn-closed"
                    class="btn btn-sm btn-ghost text-gray-500  px-8 border border-gray-100 normal-case">Closed</button>

            </div>
        </div>

        <div class="bg-white p-5 rounded-t-xl border border-gray-100 shadow-sm flex items-center justify-between">
            <div class="flex items-center gap-4">
                <div class="w-10 h-10 bg-indigo-50 text-[#6322FF] rounded-full flex items-center justify-center">
                    <img src="../assets/Aperture.png" alt="" />
                </div>
                <div>
                    <h2 class="text-xl font-bold text-slate-800 leading-none">
                        <span id="quntti">50</span> Issues
                    </h2>
                    <p class="text-sm text-slate-400 mt-1">
                        Track and manage your project issues
                    </p>
                </div>
            </div>

            <div class="flex items-center gap-6">
                <div class="flex items-center gap-2">
                    <span class="w-2.5 h-2.5 bg-emerald-400 rounded-full"></span>
                    <span class="text-sm font-medium text-slate-600">Open</span>
                </div>
                <div class="flex items-center gap-2">
                    <span class="w-[10px] h-[10px] bg-purple-500 rounded-full"></span>
                    <span class="text-sm font-medium text-slate-600">Closed</span>
                </div>
            </div>
        </div>


    </div>

</body>

</html>
